<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>یادیں اور باتیں</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

<div class="glass-container">

    <!-- TITLE (dynamic heading) -->
    <h3 id="titleHeading"></h3>

    <!-- TEXT -->
    <div id="textContent"></div>

    <!-- DATE AFTER TEXT -->
    <div id="dateDisplay"></div>

    <!-- BUTTONS AT BOTTOM -->
    <div class="navigation-buttons">
        <button id="prevBtn" class="btn btn-outline-light btn-sm" onclick="prevSection()" disabled>
            ← Back
        </button>
        <button id="nextBtn" class="btn btn-info btn-sm text-white" onclick="nextSection()" disabled>
            Next →
        </button>
    </div>

    <div id="status">Load a sheet to begin.</div>

</div>

<!-- Modal for Sheet Input -->
<div class="modal fade" id="sheetModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Enter Google Sheet 5-character code</h5>
            </div>
            <div class="modal-body">
                <input type="text" id="sheetUrl" class="form-control" placeholder="Enter 5 characters...">
            </div>
            <div class="modal-footer">
                <button class="btn btn-info text-white fw-bold" onclick="fetchContent()">Load Sheet</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="./js/script.js"></script>

</body>
</html>
